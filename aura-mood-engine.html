<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aura.moodengine | BSGVerse</title>
  <link rel="stylesheet" href="aura-mood-engine.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Animated Background -->
  <div class="neon-grid"></div>
  <div class="floating-particles"></div>
  
  <!-- Navigation Back -->
  <nav class="neon-nav">
    <div class="nav-container">
      <div class="nav-brand">
        <div class="brand-glow"></div>
        <span class="neon-text">aura.moodengine</span>
        <div class="brand-particles"></div>
      </div>
      
      <div class="nav-links">
        <a href="index.html" class="nav-link">
          <span class="nav-icon">🏠</span>
          <span class="nav-text">Back to BSGVerse</span>
          <div class="link-glow"></div>
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="aura-main">
    <div class="aura-container">
      <div class="aura-header">
        <h1 class="aura-title">
          <span class="neon-cyan">AURA</span>
          <span class="neon-pink">.MoodEngine</span>
        </h1>
        <p class="aura-subtitle">Advanced Emotional Intelligence System</p>
      </div>
      
      <div class="aura-content">
        <div class="mood-engine">
          <div class="engine-display">
            <div class="mood-visualization">
              <canvas id="mood-canvas" width="400" height="300"></canvas>
            </div>
            <div class="mood-stats">
              <div class="stat-item">
                <span class="stat-label">Current Mood:</span>
                <span class="stat-value" id="current-mood">Neutral</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Emotional State:</span>
                <span class="stat-value" id="emotional-state">Balanced</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Energy Level:</span>
                <span class="stat-value" id="energy-level">Medium</span>
              </div>
            </div>
          </div>
          
          <div class="mood-controls">
            <div class="control-group">
              <label for="mood-input">Express Your Mood:</label>
              <textarea id="mood-input" placeholder="How are you feeling today? Describe your emotions..." rows="4"></textarea>
            </div>
            
            <div class="mood-buttons">
              <button class="mood-btn happy" onclick="setMood('happy')">😊 Happy</button>
              <button class="mood-btn sad" onclick="setMood('sad')">😢 Sad</button>
              <button class="mood-btn excited" onclick="setMood('excited')">🤩 Excited</button>
              <button class="mood-btn calm" onclick="setMood('calm')">😌 Calm</button>
              <button class="mood-btn anxious" onclick="setMood('anxious')">😰 Anxious</button>
              <button class="mood-btn angry" onclick="setMood('angry')">😠 Angry</button>
            </div>
            
            <div class="action-buttons">
              <button class="neon-button cyan" onclick="analyzeMood()">Analyze Mood</button>
              <button class="neon-button pink" onclick="generateResponse()">Generate Response</button>
              <button class="neon-button green" onclick="resetMood()">Reset</button>
            </div>
          </div>
        </div>
        
        <div class="mood-analysis">
          <h3>Mood Analysis</h3>
          <div id="analysis-output" class="analysis-content">
            <p>Enter your mood or describe your feelings to get started...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Audio Elements -->
  <audio id="mood-sound" preload="auto">
    <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIG2m98OScTgwOUarm7blmGgU7k9n1unEiBC13yO/eizEIHWq+8+OWT" type="audio/wav">
  </audio>

  <script src="aura-mood-engine.js"></script>
  <script>
    // Initialize aura.moodengine
    document.addEventListener('DOMContentLoaded', function() {
      console.log('AURA.MoodEngine initialized');
      
      // Initialize mood canvas
      const canvas = document.getElementById('mood-canvas');
      const ctx = canvas.getContext('2d');
      
      // Draw initial mood visualization
      drawMoodVisualization(ctx, 'neutral');
      
      // Add event listeners
      document.getElementById('mood-input').addEventListener('input', function() {
        analyzeMood();
      });
    });
    
    function setMood(mood) {
      const moodInput = document.getElementById('mood-input');
      const canvas = document.getElementById('mood-canvas');
      const ctx = canvas.getContext('2d');
      
      // Update mood input
      const moodTexts = {
        happy: "I'm feeling great today! Everything seems bright and positive.",
        sad: "I'm feeling down and a bit melancholic today.",
        excited: "I'm super excited and full of energy!",
        calm: "I'm feeling peaceful and relaxed.",
        anxious: "I'm feeling worried and tense about things.",
        angry: "I'm feeling frustrated and upset."
      };
      
      moodInput.value = moodTexts[mood] || '';
      
      // Update visual elements
      document.getElementById('current-mood').textContent = mood.charAt(0).toUpperCase() + mood.slice(1);
      drawMoodVisualization(ctx, mood);
      
      // Play mood sound
      const audio = document.getElementById('mood-sound');
      audio.play().catch(e => console.log('Audio play failed:', e));
      
      // Analyze the mood
      analyzeMood();
    }
    
    function drawMoodVisualization(ctx, mood) {
      const width = ctx.canvas.width;
      const height = ctx.canvas.height;
      
      // Clear canvas
      ctx.clearRect(0, 0, width, height);
      
      // Set background
      ctx.fillStyle = 'rgba(10, 10, 10, 0.9)';
      ctx.fillRect(0, 0, width, height);
      
      // Draw mood-specific visualization
      const colors = {
        happy: '#00ff00',
        sad: '#0000ff',
        excited: '#ff00ff',
        calm: '#00ffff',
        anxious: '#ffff00',
        angry: '#ff0000',
        neutral: '#888888'
      };
      
      const color = colors[mood] || colors.neutral;
      
      // Draw mood waves
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      
      for (let x = 0; x < width; x += 5) {
        const amplitude = mood === 'excited' ? 50 : mood === 'calm' ? 20 : 30;
        const frequency = mood === 'anxious' ? 0.1 : 0.05;
        const y = height/2 + Math.sin(x * frequency) * amplitude;
        ctx.lineTo(x, y);
      }
      
      ctx.stroke();
      
      // Add glow effect
      ctx.shadowColor = color;
      ctx.shadowBlur = 20;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    
    function analyzeMood() {
      const input = document.getElementById('mood-input').value;
      const output = document.getElementById('analysis-output');
      
      if (!input.trim()) {
        output.innerHTML = '<p>Enter your mood or describe your feelings to get started...</p>';
        return;
      }
      
      // Simple mood analysis
      const text = input.toLowerCase();
      let mood = 'neutral';
      let confidence = 0.5;
      
      if (text.includes('happy') || text.includes('great') || text.includes('good') || text.includes('excited')) {
        mood = 'positive';
        confidence = 0.8;
      } else if (text.includes('sad') || text.includes('down') || text.includes('bad') || text.includes('depressed')) {
        mood = 'negative';
        confidence = 0.7;
      } else if (text.includes('anxious') || text.includes('worried') || text.includes('nervous')) {
        mood = 'anxious';
        confidence = 0.6;
      } else if (text.includes('angry') || text.includes('mad') || text.includes('frustrated')) {
        mood = 'angry';
        confidence = 0.7;
      }
      
      // Update stats
      document.getElementById('emotional-state').textContent = mood.charAt(0).toUpperCase() + mood.slice(1);
      document.getElementById('energy-level').textContent = confidence > 0.7 ? 'High' : confidence > 0.4 ? 'Medium' : 'Low';
      
      // Generate analysis
      const analysis = `
        <div class="analysis-item">
          <h4>Mood Analysis Results:</h4>
          <p><strong>Detected Mood:</strong> ${mood.charAt(0).toUpperCase() + mood.slice(1)}</p>
          <p><strong>Confidence Level:</strong> ${Math.round(confidence * 100)}%</p>
          <p><strong>Analysis:</strong> Your emotional state appears to be ${mood}. Based on your description, I can sense ${confidence > 0.6 ? 'strong' : 'moderate'} emotional intensity.</p>
        </div>
      `;
      
      output.innerHTML = analysis;
    }
    
    function generateResponse() {
      const input = document.getElementById('mood-input').value;
      const output = document.getElementById('analysis-output');
      
      if (!input.trim()) {
        output.innerHTML = '<p>Please enter your mood first to generate a response.</p>';
        return;
      }
      
      const responses = {
        positive: "That's wonderful! Your positive energy is contagious. Keep spreading that joy! 🌟",
        negative: "I understand you're going through a tough time. Remember, it's okay to feel this way, and better days are ahead. 💙",
        anxious: "I sense you're feeling anxious. Try taking some deep breaths and remember that you're stronger than your worries. 🧘‍♀️",
        angry: "I can feel your frustration. It's important to acknowledge these feelings. Consider what might help you find some peace. 🕊️",
        neutral: "I appreciate you sharing your feelings. Sometimes neutrality can be a sign of processing or transition. 🤔"
      };
      
      const text = input.toLowerCase();
      let responseType = 'neutral';
      
      if (text.includes('happy') || text.includes('great') || text.includes('good')) {
        responseType = 'positive';
      } else if (text.includes('sad') || text.includes('down') || text.includes('bad')) {
        responseType = 'negative';
      } else if (text.includes('anxious') || text.includes('worried')) {
        responseType = 'anxious';
      } else if (text.includes('angry') || text.includes('mad')) {
        responseType = 'angry';
      }
      
      const response = responses[responseType];
      
      output.innerHTML = `
        <div class="analysis-item">
          <h4>AURA Response:</h4>
          <p class="aura-response">${response}</p>
          <p><em>Generated by AURA.MoodEngine v1.0</em></p>
        </div>
      `;
    }
    
    function resetMood() {
      document.getElementById('mood-input').value = '';
      document.getElementById('current-mood').textContent = 'Neutral';
      document.getElementById('emotional-state').textContent = 'Balanced';
      document.getElementById('energy-level').textContent = 'Medium';
      document.getElementById('analysis-output').innerHTML = '<p>Enter your mood or describe your feelings to get started...</p>';
      
      const canvas = document.getElementById('mood-canvas');
      const ctx = canvas.getContext('2d');
      drawMoodVisualization(ctx, 'neutral');
    }
  </script>
</body>
