<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="game.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
</head>
<body>
    <button id="games-btn" class="glow-btn">
        <span class="glow-text">Games</span>
    </button>
    <div class="game-container">
        <div class="game-header">
            <h1>Tic Tac Toe</h1>
            <div class="player-selection">
                <button id="player1-btn" class="player-btn active">Player 1 (X)</button>
                <button id="player2-btn" class="player-btn">Player 2 (O)</button>
            </div>
        </div>
        <div class="game-board">
            <div class="board">
                <div class="cell" data-cell-index="0"></div>
                <div class="cell" data-cell-index="1"></div>
                <div class="cell" data-cell-index="2"></div>
                <div class="cell" data-cell-index="3"></div>
                <div class="cell" data-cell-index="4"></div>
                <div class="cell" data-cell-index="5"></div>
                <div class="cell" data-cell-index="6"></div>
                <div class="cell" data-cell-index="7"></div>
                <div class="cell" data-cell-index="8"></div>
            </div>
        </div>
        <div class="controls">
            <button id="reset-btn">Reset Game</button>
            <button id="back-btn">Back to Portfolio</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
