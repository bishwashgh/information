        .dropdown {
      float: left;

    }

    .dropdown .dropbtn {
      font-size: 16px;
      border: none;
      outline: none;
      color:black;
      padding: 14px 16px;
      background-color: inherit;
      font-family: inherit;
      margin: 0;
      cursor: pointer;
    }

    .navbar a:hover, .dropdown:hover .dropbtn {
      color: #2196F3;
    }

   
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: black;
      min-width: 200px;
      border-radius: 10px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
      z-index: 1;
    }

    /* Dropdown links */
    .dropdown-content a {
      float: none;
      color:black;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      text-align: left;
    }

    .dropdown-content a:hover {
      background-color: black;
    }

    /* Show dropdown on hover */
    .dropdown:hover .dropdown-content {
      display: block;
    }
    </style>
