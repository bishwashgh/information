<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bishwas Portfolio</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/matrix.css" />
<link rel="stylesheet" href="assets/css/glitch.css" />
<link rel="stylesheet" href="assets/css/mood.css">
<link rel="stylesheet" href="assets/css/moodBackgrounds.css">
<link rel="stylesheet" href="assets/css/rainEffect.css" />
<link rel="stylesheet" href="assets/css/flowerGarden.css" />
<link rel="stylesheet" href="assets/css/stars.css" />
<link rel="stylesheet" href="assets/css/celestial.css" />
</head>
<body>
  <div id="cosmic-bg"></div>

  <header>
    <h1>Bishwas Ghimire</h1>
    <p>Welcome to the multiverse of my digital self</p>
    <button id="game-button" style="
        position: absolute;
        top: 20px;
        right: 20px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: #c0c0c0;
        border: none;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        box-shadow: 0 0 10px rgba(192, 192, 192, 0.8);
        transition: all 0.3s ease;
    ">
      🎮
    </button>
  </header>

  <main>
    <div class="portal" data-target="projects">
      <div class="portal-glow"></div>
      <h2>Suspicious</h2>
      <p>Access restricted. Enter password to view something crispy.</p>
    </div>
    <div class="portal" data-target="about">
      <div class="portal-glow"></div>
      <h2>About Me</h2>
      <p>Discover my true essence</p>
    </div>
    <div class="portal" data-target="achievements">
      <div class="portal-glow"></div>
      <h2>Achievements</h2>
      <p>Witness my milestones</p>
    </div>
    <div class="portal" data-target="ai">
      <div class="portal-glow"></div>
      <h2>AI Self</h2>
      <p>Interact with my holographic assistant</p>
    </div>
  </main>

  <div id="modal" class="hidden">
    <button id="close-modal">X</button>
    <div id="modal-content"></div>
  </div>

  <script src="assets/js/quantumEffect.js"></script>
  <script src="assets/js/matrixEffects.js"></script>
  <script src="assets/js/hiddenMessages.js"></script>
  <script src="assets/js/moodSystem.js"></script>
  <script src="assets/js/rainEffect.js"></script>
  <script src="assets/js/flowerGarden.js"></script>
  <script src="assets/js/stars.js"></script>
  <script src="assets/js/celestial.js"></script>
  <script src="assets/js/portal.js"></script>
  <script src="modal.js"></script>
</body>
</html>
